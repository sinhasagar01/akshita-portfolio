aboutCopy: >-
  I am a product designer with over seven years of experience designing SaaS,
  e-commerce, and enterprise products. My work centres on user-centered design,
  prototyping, and real business impact.


  Right now I am at LTIMindtree, designing a mechanic-first mobile app for OTIS
  that simplifies how field mechanics maintain elevators. Across my career I
  have shaped products spanning fitness wearables, AI data platforms, and
  point-of-sale systems used by more than twenty thousand merchants, and I was
  recognised with a Design Innovation Award along the way.
