title: boAt Crest
summary: >-
  Rebuilding boAt's fitness companion app from a cluttered tracker into a calm,
  guided experience, and lifting the store rating from 2.3 to 4.
orderIndex: 1
heroImage: /images/projects/boat-crest/heroImage.png
facts:
  role: Sole product designer, from research through final UI
  type: Mobile app redesign
  platform: Android and iOS
  timeline: 10 weeks
body:
  - discriminant: heroBlock
    value:
      thesis: >-
        Rebuilding boAt's fitness app from a cluttered tracker into a calm,
        guided companion people actually wanted to open.
  - discriminant: summaryGrid
    value:
      product: >-
        boAt Crest, the companion app for boAt's smartwatches and fitness
        wearables.
      problem: >-
        A cluttered, one size fits all interface that users found hard to
        navigate and easy to abandon.
      details: >-
        Sole product designer across research, experience, and interface, on
        Android and iOS.
      solution: >-
        A decluttered, personalised app with guided onboarding, customisable
        watch faces, social challenges, and a unified design system.
      result: The app store rating climbed from 2.3 to 4.
  - discriminant: impactNumbers
    value:
      stat1Number: '4.0'
      stat1Label: App store rating, up from 2.3 after the redesign
      stat2Number: '100'
      stat2Label: Users surveyed to ground every decision
      stat3Number: 90%
      stat3Label: Had been dissatisfied with the old interface
  - discriminant: context
    value: {}
  - discriminant: problem
    value:
      statement: >-
        The app that should have made boAt's watches shine was the weakest part
        of the experience. Navigation was confusing, the tracking gave people
        little they could act on, and nothing adapted to the person using it.
        Most tried it once and drifted away.
  - discriminant: goals
    value:
      northStar: >-
        An app boAt users actually want to open, one that feels calm, personal,
        and worth coming back to.
      goals:
        - Declutter the interface so the core actions are obvious
        - Personalise the experience around each user's own fitness goals
        - Replace generic flows with guided onboarding and guided workouts
        - Build motivation through social challenges and shared progress
        - Establish a unified design system for a consistent, polished feel
  - discriminant: processSteps
    value:
      steps:
        - phase: Discover
          description: >-
            Stakeholder and user interviews, a survey of 100 users, and a
            competitive teardown of the leading fitness apps.
        - phase: Define
          description: >-
            A primary persona, an empathy map, and a user journey map to anchor
            every decision in a real person.
        - phase: Develop
          description: >-
            Information architecture, a design system, and high fidelity screens
            for onboarding, tracking, watch faces, and social.
        - phase: Deliver
          description: >-
            Split testing the new flows against the old, then design handoff and
            support through development.
  - discriminant: keyInsights
    value:
      insights:
        - number: '01'
          insight: >-
            75 percent of people surveyed used a fitness app regularly, so the
            demand was real and the old experience was simply not meeting it.
        - number: '02'
          insight: >-
            90 percent were dissatisfied with the old interface, which told me
            the problem was the experience, not the hardware.
        - number: '03'
          insight: >-
            85 percent wanted guided workouts over generic exercises, and that
            became the backbone of the new flows.
  - discriminant: solutionReveal
    value:
      headline: >-
        boAt Crest, rebuilt as a calm, guided fitness companion that adapts to
        the person wearing the watch.
  - discriminant: guidedDesignStep
    value:
      title: Guided onboarding
      caption: >-
        A layered onboarding that pairs the watch and sets goals one step at a
        time, instead of dropping people into a crowded home screen.
  - discriminant: guidedDesignStep
    value:
      title: Streamlined navigation
      caption: >-
        A simplified navigation bar that keeps Fitness, Watch, and Buddies one
        tap away, clearing the clutter that used to drive people off.
  - discriminant: guidedDesignStep
    value:
      title: Real time insights
      caption: >-
        Tracking that surfaces clear, glanceable insight on heart rate, energy,
        sleep, and stress, so the numbers finally mean something.
  - discriminant: guidedDesignStep
    value:
      title: Watchface Studio
      caption: >-
        A studio for browsing and customising watch faces, turning a buried
        setting into a reason to open the app.
  - discriminant: guidedDesignStep
    value:
      title: My Buddies
      caption: >-
        Social challenges and shared progress that turn solo tracking into
        something motivating.
  - discriminant: imageGallery
    value:
      caption: >-
        A selection of screens across fitness tracking, watch management, and
        social.
  - discriminant: comparison
    value:
      caption: >-
        The old interface beside the redesign, the same data made calm and
        legible.
  - discriminant: quote
    value:
      text: >-
        Every screen had to earn its place. If it did not help someone move,
        sleep, or recover better, it did not belong.
      attribution: My design principle for the redesign
  - discriminant: reflection
    value: {}
  - discriminant: closingLine
    value:
      line: boAt's watches finally had an app worth wearing them for.
