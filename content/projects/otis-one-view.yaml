title: Elevate ONE View
summary: Designing the mobile interface field mechanics use to commission and maintain Elevate elevators worldwide, turning a heavy workflow into something fast in the field.
orderIndex: 4
heroImage: null
facts:
  role: UX and UI designer, owning the design system and the 2.0 version
  type: Enterprise mobile app, industry project
  platform: Mobile
  timeline: 6 months
body:
  - discriminant: heroBlock
    value:
      thesis: Simplifying the app field mechanics rely on to bring Elevate elevators online, anywhere in the world.
  - discriminant: summaryGrid
    value:
      product: Elevate ONE View, the primary mobile interface for Elevate field mechanics, and the field side of an IoT platform.
      problem: A heavy, inconsistent app made commissioning and maintaining elevators slow and error prone in the field.
      details: UX and UI designer on a cross functional team of 35, owning the design system and the 2.0 redesign over six months.
      solution: A single, simplified workflow for the full lifecycle of an elevator's connectivity, from commissioning to troubleshooting.
      result: A decluttered first version that streamlined the core flow and helped win the business.
  - discriminant: impactNumbers
    value:
      stat1Number: "10%"
      stat1Label: Reduction in the core flow after decluttering
      stat2Number: "1,899"
      stat2Label: Field uploads across regions
      stat3Number: "4"
      stat3Label: Global regions served, APAC, EMEA, NAA, and China
  - discriminant: context
    value:
      body: null
  - discriminant: problem
    value:
      statement: The app meant to make a mechanic's job easier was getting in the way. Layouts broke across screens, components behaved inconsistently, navigation felt heavy and disconnected, and the visual tone was uneven. The result was friction in exactly the moments a mechanic needed speed.
      image: null
  - discriminant: goals
    value:
      northStar: One simplified app a field mechanic can move through quickly, anywhere in the world.
      goals:
        - Replace multiple tangled workflows with a single simplified one
        - Make components behave consistently across the whole app
        - Give navigation a clear, predictable structure
        - Align the visuals with Elevate's industrial tone
  - discriminant: processSteps
    value:
      steps:
        - phase: Product planning and requirement gathering
          description: Planning sessions with product managers, business teams, and scrum masters to align on requirements, priorities, and goals.
        - phase: Cross functional requirement discussion
          description: Worked with development, design, and product teams to understand scope, then shared technical detail with developers for feasibility.
        - phase: Design implementation and approval
          description: Created flows, presented them to the product team for approval, and handed off to development.
        - phase: Development and testing
          description: Supported the build, with an iterative loop between stakeholders, developers, and design to hold quality.
  - discriminant: keyInsights
    value:
      insights:
        - number: "01"
          insight: The app did not adapt to different screens, so layouts broke and the basics had to come first.
        - number: "02"
          insight: Components behaved inconsistently across the app, which made every screen feel unfamiliar.
        - number: "03"
          insight: Navigation felt heavy and disconnected, so a clear, consistent structure mattered more than any single feature.
  - discriminant: solutionReveal
    value:
      headline: Elevate ONE View, rebuilt as one simplified workflow a mechanic can trust in the field.
      image: null
  - discriminant: guidedDesignStep
    value:
      title: Reliable components
      caption: A consistent component set across every flow, so the app behaves the same everywhere.
      image: null
  - discriminant: guidedDesignStep
    value:
      title: A simplified on site workflow
      caption: The commissioning and maintenance flow streamlined for speed in the field.
      image: null
  - discriminant: guidedDesignStep
    value:
      title: An industrial visual tone
      caption: Visuals aligned to Elevate's industrial identity rather than a generic app look.
      image: null
  - discriminant: imageGallery
    value:
      image1: null
      image2: null
      image3: null
      caption: Selected screens, kept limited for confidentiality.
  - discriminant: comparison
    value:
      beforeImage: null
      afterImage: null
      caption: The heavy old flow beside the simplified redesign.
  - discriminant: quote
    value:
      text: For a mechanic on site, every extra tap is time lost, so the whole job was to take taps away.
      attribution: My design principle for the redesign
  - discriminant: reflection
    value:
      body: null
  - discriminant: closingLine
    value:
      line: A simpler app, and a faster job, for mechanics in the field.
