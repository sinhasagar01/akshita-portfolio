<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Process artifact graphics reference</title>
<!--
  REFERENCE ONLY. These are the four artifact graphics for the Process section,
  one per stage, in order. Swap them into the four artifact states in ProcessSection.
    Stage 1 = Discover, Stage 2 = Define, Stage 3 = Design, Stage 4 = Validate.
  The graphics carry NO text labels, do not add captions over or under them.
  The frame around each and the bloom already exist in the component, only the SVG
  content changes, and the bloom should now sit behind every stage, not just Validate.
  Translate these literal colors to the tokens in globals.css, do not hardcode:
    #B5613C  terracotta            -> --color-accent-500
    #FBF8F2  inner surface         -> --color-surface
    #211C16  ink frame stroke      -> --color-text-primary
    #B8B0A3 / #C7BFB2 / #CBC3B6 / #D8CFC0  muted -> your ink and muted tokens
    rgba(181,97,60, x)  bloom and tints -> accent at low alpha
  Each graphic uses viewBox 0 0 280 210 and should fill the artifact frame.
-->
<style>
body{margin:0;background:#EFEAE0;font-family:system-ui,sans-serif;display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:40px;max-width:820px;margin:0 auto}
.frame{position:relative;background:#FAF6EE;border:1px solid rgba(33,28,22,.12);border-radius:14px;overflow:hidden;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.bloom{position:absolute;left:50%;top:48%;width:74%;height:64%;transform:translate(-50%,-50%);background:radial-gradient(50% 50% at 50% 50%,rgba(181,97,60,.13),rgba(250,246,238,0) 70%);pointer-events:none}
svg{position:relative;width:86%;height:auto}
</style>
</head>
<body>
<!-- Stage 1, Discover -->
<div class="frame">
  <div class="bloom"></div>
  <svg viewBox="0 0 280 210" aria-hidden="true">
    <g stroke="#B8B0A3" stroke-width="1.6" fill="#FBF8F2">
      <rect x="36" y="64" width="74" height="56" rx="6" transform="rotate(-6 73 92)"/>
      <rect x="96" y="42" width="74" height="56" rx="6" transform="rotate(5 133 70)"/>
    </g>
    <g stroke="#CBC3B6" stroke-width="1.5" stroke-linecap="round">
      <line x1="48" y1="84" x2="92" y2="80" transform="rotate(-6 73 92)"/>
      <line x1="48" y1="96" x2="78" y2="94" transform="rotate(-6 73 92)"/>
      <line x1="108" y1="60" x2="152" y2="58" transform="rotate(5 133 70)"/>
      <line x1="108" y1="72" x2="138" y2="71" transform="rotate(5 133 70)"/>
    </g>
    <circle cx="188" cy="122" r="30" fill="none" stroke="#B5613C" stroke-width="2.5"/>
    <line x1="210" y1="144" x2="236" y2="170" stroke="#B5613C" stroke-width="3" stroke-linecap="round"/>
    <circle cx="210" cy="56" r="3" fill="#C7BFB2"/>
    <text x="224" y="80" font-family="Fraunces,serif" font-style="italic" font-size="26" fill="#CBC3B6">?</text>
  </svg>
</div>
<!-- Stage 2, Define -->
<div class="frame">
  <div class="bloom"></div>
  <svg viewBox="0 0 280 210" aria-hidden="true">
    <rect x="40" y="48" width="96" height="116" rx="9" fill="#FBF8F2" stroke="#211C16" stroke-opacity=".55" stroke-width="1.4"/>
    <circle cx="64" cy="74" r="11" fill="none" stroke="#B5613C" stroke-width="1.8"/>
    <rect x="84" y="68" width="40" height="6" rx="3" fill="rgba(33,28,22,.22)"/>
    <rect x="84" y="80" width="28" height="5" rx="2.5" fill="rgba(33,28,22,.13)"/>
    <rect x="56" y="104" width="64" height="5" rx="2.5" fill="rgba(33,28,22,.12)"/>
    <rect x="56" y="116" width="64" height="5" rx="2.5" fill="rgba(33,28,22,.12)"/>
    <rect x="56" y="128" width="44" height="5" rx="2.5" fill="rgba(33,28,22,.12)"/>
    <line x1="168" y1="106" x2="244" y2="106" stroke="#C7BFB2" stroke-width="1.6"/>
    <circle cx="168" cy="106" r="6.5" fill="#FBF8F2" stroke="#B8B0A3" stroke-width="1.6"/>
    <circle cx="206" cy="106" r="6.5" fill="#B5613C"/>
    <circle cx="244" cy="106" r="6.5" fill="#FBF8F2" stroke="#B8B0A3" stroke-width="1.6"/>
  </svg>
</div>
<!-- Stage 3, Design -->
<div class="frame">
  <div class="bloom"></div>
  <svg viewBox="0 0 280 210" aria-hidden="true">
    <rect x="62" y="34" width="156" height="138" rx="11" fill="#FBF8F2" stroke="#211C16" stroke-opacity=".65" stroke-width="1.5"/>
    <circle cx="78" cy="50" r="3" fill="#C7BFB2"/><circle cx="89" cy="50" r="3" fill="#C7BFB2"/>
    <line x1="62" y1="62" x2="218" y2="62" stroke="rgba(33,28,22,.1)" stroke-width="1"/>
    <rect x="78" y="78" width="84" height="10" rx="4" fill="rgba(33,28,22,.22)"/>
    <rect x="78" y="98" width="124" height="7" rx="3.5" fill="rgba(33,28,22,.12)"/>
    <rect x="78" y="112" width="108" height="7" rx="3.5" fill="rgba(33,28,22,.12)"/>
    <rect x="78" y="136" width="54" height="18" rx="5" fill="#B5613C"/>
  </svg>
</div>
<!-- Stage 4, Validate -->
<div class="frame">
  <div class="bloom"></div>
  <svg viewBox="0 0 280 210" aria-hidden="true">
    <rect x="50" y="40" width="150" height="130" rx="11" fill="#FBF8F2" stroke="#211C16" stroke-opacity=".7" stroke-width="1.5"/>
    <circle cx="66" cy="56" r="3" fill="#C7BFB2"/><circle cx="77" cy="56" r="3" fill="#C7BFB2"/>
    <rect x="66" y="74" width="80" height="9" rx="4" fill="rgba(33,28,22,.22)"/>
    <rect x="66" y="92" width="118" height="6" rx="3" fill="rgba(33,28,22,.12)"/>
    <rect x="66" y="104" width="100" height="6" rx="3" fill="rgba(33,28,22,.12)"/>
    <rect x="66" y="126" width="48" height="16" rx="5" fill="rgba(181,97,60,.85)"/>
    <circle cx="196" cy="48" r="17" fill="#B5613C"/>
    <path d="M188 48 l5 5 10 -11" fill="none" stroke="#FBF8F2" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="214" y="150" width="10" height="14" rx="2" fill="#D8CFC0"/>
    <rect x="230" y="140" width="10" height="24" rx="2" fill="#C7BFB2"/>
    <rect x="246" y="126" width="10" height="38" rx="2" fill="#B5613C"/>
  </svg>
</div>
</body>
</html>
