<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Process graphics reference (draw-on)</title>
<!--
  ============================================================
  PROCESS CARD GRAPHICS  -  draw-on, "watch the idea become the design"
  ============================================================
  Each stage graphic must DRAW ITSELF when its stage becomes active (on scroll
  scrub AND on stepper click). It is NOT static. The line sketches in, then the
  fills settle. This is the whole point of the section heading.

  THE FOUR GRAPHICS (one idea growing up):
    Discover  -> lightbulb whose filament is the loose scribble, three spark
                 rays, and the word "idea" handwritten (Caveat) under the bulb
    Define    -> boxes + dashed connectors (structure)
    Design    -> clean WIREFRAME screen (warm-neutral blocks)
    Validate  -> FINISHED screen (filled header, bar chart, check)

  HOW THE DRAW-ON WORKS (this is the important part):
    - Stroke elements that should draw get:  class="dr"  pathLength="1"
        CSS: .dr { stroke-dasharray: 1; stroke-dashoffset: 1; }
        Animate stroke-dashoffset 1 -> 0 to draw the line. pathLength="1"
        normalises every shape so one rule works for paths, rects, circles.
    - Filled elements that should appear get: class="fd"
        CSS: .fd { opacity: 0; }
        Fade opacity 0 -> 1 AFTER the strokes finish (delay).
    - Stagger the strokes (~0.13s each, 0.6s draw) so it sketches in order,
      then fade the fills (~0.08s each, 0.45s) starting after the strokes.

  REACT WIRING (in the real fan deck):
    - Each Artifact* component renders its SVG with the .dr / .fd markup below.
    - Run the draw whenever THIS card's stage becomes the active stage, e.g.
      useEffect(() => { if (active === index) runDraw(svgRef.current); }, [active]);
    - runDraw: for each .dr set transition none, dashoffset 1, force reflow,
      then transition stroke-dashoffset .6s with delay i*0.13, set offset 0.
      For each .fd: opacity 0, then transition opacity .45s with delay
      (drawCount*0.13 + 0.25 + i*0.08), set opacity 1.
    - It re-draws every time you scrub back onto that stage. That is wanted.
    - REDUCED MOTION (and mobile no-pin): skip the animation, set every .dr
      stroke-dashoffset 0 and every .fd opacity 1 immediately so the graphic is
      just present. GSAP is not required, plain style transitions are fine.

  TOKENS:
    #B5613C terracotta line + accents + check -> --color-accent-500
    #e7d5c2 #efdfcb #cda98c #cdb89a warm fills -> warm cream/sand steps
    #fff finished-screen fill -> white or lightest surface
    card frame border --color-accent-500, bg --color-cream-50 (unchanged)
    corner tag (rough/structure/wireframe/shipped) Caveat, muted, shipped=accent
  ============================================================
  This file self-demos: click a stage below and watch it draw.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,400&family=DM+Sans:wght@400;500&family=Caveat:wght@600&display=swap');
body{margin:0;background:#e7ddcd;padding:40px;font-family:'DM Sans',system-ui,sans-serif;color:#211C16}
.wrap{max-width:560px;margin:0 auto;background:#FBF6EE;border:1px solid rgba(120,90,60,.12);border-radius:18px;padding:34px 34px 30px;text-align:center}
.h{font-family:'Fraunces',serif;font-style:italic;font-size:20px;margin:0 0 18px}
.card{position:relative;width:230px;height:296px;margin:0 auto;border:1.5px solid #B5613C;background:#FBF6EE;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(120,90,60,.1)}
.card svg{width:88%;height:82%}
.dr{stroke-dasharray:1;stroke-dashoffset:1}
.fd{opacity:0}
.tag{position:absolute;top:10px;right:14px;font-family:'Caveat';font-size:19px;color:#c0a085}
.nav{display:inline-flex;gap:7px;margin-top:22px}
.b{font-size:11.5px;letter-spacing:.06em;color:#7E7466;background:#F2EADD;border:1px solid rgba(120,90,60,.16);border-radius:999px;padding:7px 13px;cursor:pointer;transition:.2s}
.b.on{background:#B5613C;color:#fff;border-color:#B5613C}
.hint{margin-top:12px;color:#9C9182;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <p class="h">watch the idea become the design</p>
  <div class="card"><span class="tag" id="tag"></span><div id="art" style="width:88%;height:82%;display:flex;align-items:center;justify-content:center"></div></div>
  <div class="nav" id="nav"></div>
  <div class="hint">click a stage, watch it draw</div>
</div>
<script>
var TAGS=['rough','structure','wireframe','shipped'];
var ART=[
 '<svg viewBox="0 0 200 240" fill="none" stroke="#B5613C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle class="dr" pathLength="1" cx="100" cy="84" r="31"/><path class="dr" pathLength="1" d="M87 110 L87 126 Q87 137 100 137 Q113 137 113 126 L113 110"/><path class="dr" pathLength="1" d="M88 117 H112"/><path class="dr" pathLength="1" d="M90 123 H110"/><path class="dr" pathLength="1" d="M89 88 q6 -14 11 0 q6 14 11 0"/><path class="fd" d="M100 34 V23" stroke-width="2.6"/><path class="fd" d="M66 48 L58 40" stroke-width="2.6"/><path class="fd" d="M134 48 L142 40" stroke-width="2.6"/><text class="fd" x="100" y="190" text-anchor="middle" font-family="Caveat,cursive" font-size="34" fill="#B5613C" stroke="none" transform="rotate(-4 100 190)">idea</text><path class="fd" d="M78 200 q22 8 44 0" stroke="#B5613C" stroke-width="2.4"/></svg>',
 '<svg viewBox="0 0 200 240" fill="none"><g stroke="#B5613C" stroke-width="3"><rect class="dr" pathLength="1" x="40" y="62" width="50" height="38" rx="7"/><rect class="dr" pathLength="1" x="112" y="62" width="50" height="38" rx="7"/><rect class="dr" pathLength="1" x="76" y="150" width="50" height="38" rx="7"/></g><g class="fd" stroke="#B5613C" stroke-width="2.4" stroke-dasharray="2 7" fill="none"><path d="M65 100 V128 H101 V150"/><path d="M137 100 V128 H101"/></g><path class="fd" d="M95 144 l6 6 l6 -6" stroke="#B5613C" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>',
 '<svg viewBox="0 0 200 240" fill="none"><g stroke="#B5613C" stroke-width="3"><rect class="dr" pathLength="1" x="58" y="44" width="84" height="158" rx="11"/><path class="dr" pathLength="1" d="M58 76 H142"/></g><g class="fd" fill="#e7d5c2"><rect x="72" y="90" width="56" height="18" rx="4"/><rect x="72" y="118" width="42" height="11" rx="3"/><rect x="72" y="136" width="50" height="11" rx="3"/></g><rect class="fd" x="72" y="162" width="34" height="15" rx="4" fill="#cda98c"/></svg>',
 '<svg viewBox="0 0 200 240" fill="none"><rect class="dr" pathLength="1" x="58" y="40" width="84" height="158" rx="11" fill="none" stroke="#B5613C" stroke-width="3"/><path class="fd" d="M58 51 a11 11 0 0 1 11 -11 h62 a11 11 0 0 1 11 11 v17 H58 Z" fill="#B5613C"/><circle class="fd" cx="76" cy="59" r="4" fill="#fff"/><rect class="fd" x="72" y="86" width="56" height="12" rx="3" fill="#efdfcb"/><g class="fd"><rect x="72" y="112" width="14" height="32" rx="2" fill="#cdb89a"/><rect x="91" y="124" width="14" height="20" rx="2" fill="#e7d5c2"/><rect x="110" y="104" width="14" height="40" rx="2" fill="#B5613C"/></g><circle class="fd" cx="124" cy="172" r="12" fill="#B5613C"/><path class="dr" pathLength="1" d="M118 172 l4 5 l8 -9" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
];
var names=['Discover','Define','Design','Validate'];
var art=document.getElementById('art'),tag=document.getElementById('tag'),nav=document.getElementById('nav');
function draw(i){
 art.innerHTML=ART[i];tag.textContent=TAGS[i];tag.style.color=i===3?'#B5613C':'#c0a085';
 var svg=art.querySelector('svg');
 var dr=svg.querySelectorAll('.dr'),fd=svg.querySelectorAll('.fd');
 dr.forEach(function(e,k){e.style.transition='none';e.style.strokeDashoffset=1;e.getBoundingClientRect();e.style.transition='stroke-dashoffset .6s ease';e.style.transitionDelay=(k*0.13)+'s';e.style.strokeDashoffset=0;});
 var base=dr.length*0.13+0.25;
 fd.forEach(function(e,k){e.style.transition='none';e.style.opacity=0;e.getBoundingClientRect();e.style.transition='opacity .45s ease';e.style.transitionDelay=(base+k*0.08)+'s';e.style.opacity=1;});
}
names.forEach(function(n,i){var b=document.createElement('button');b.className='b'+(i===0?' on':'');b.textContent=n;b.onclick=function(){[].forEach.call(nav.children,function(x,j){x.className='b'+(j===i?' on':'');});draw(i);};nav.appendChild(b);});
draw(0);
</script>
</body>
</html>
