<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero reference</title>
<!--
  ============================================================
  HERO REFERENCE  -  facet hero + cursor glow + blue handwriting
  ============================================================
  TRANSLATE these literal colors to globals.css tokens when building:

    #EAE1D4  warm deepened hero surface
             -> use the dark warm canvas tone from the color pass
                (token: --color-canvas). Add it now if it does not exist yet.
    #B5613C  terracotta, the HAND + active tab + glow core + scroll dot
             -> existing --color-accent-500. Used for the signature,
                the backdrop word (at opacity .42), the active facet tab,
                the glow core, and the scroll dot. ONE warm accent only,
                no blue, no second accent color anywhere.
    #211C16  ink  -> existing --color-ink (the Fraunces serif line only)
    #7E7466 / #948A7C / #9C9182  muted ink steps -> existing muted tokens

  FONTS:
    Kaushan Script  -> load via next/font/google (Kaushan_Script, weight 400).
                       Used for BOTH the signature AND the backdrop word.
    Fraunces italic 400 variable opsz  -> existing display font (the serif line)
    DM Sans  -> existing body font (role label, nav tabs, scroll cue)

  BEHAVIOUR:
    - Cursor-following warm glow + faint terracotta core. Follows the mouse
      inside the hero, eases back to centre on mouseleave. For reduced motion
      it stays centred and never follows.
    - 4 facets. Clicking a tab does two things. The serif LINE animates in
      WORD BY WORD, each word fading and rising into place with a short
      stagger (~42ms per word, each word opacity 0 -> 1 and translateY 15px
      -> 0, ease cubic-bezier(.22,1,.36,1)). The backdrop WORD RISES, it fades
      up and settles, slower and bigger than the line (opacity 0 -> .42,
      translateY ~24px -> 0 with a slight scale .97 -> 1, about .7s), so it
      feels like it lifts into place behind the text while the words build. The active tab is marked by
      a FROSTED GLASS pill (warm cream tint, blur, faint terracotta edge, soft
      top highlight) that SLIDES from tab to tab with a soft spring. Active
      tab text is terracotta. The pill is sized and positioned by measuring
      the active tab box, so it MUST recalc after webfonts load (document.fonts
      .ready), on window load, and on resize, or it lands off in full-page mode.
    - Backdrop word sits BEHIND the content (lower z-index), large, opacity .42,
      single line, allowed to bleed off the edges (overflow hidden on hero).
      IMPORTANT on a full-height hero: anchor the word vertically to the serif
      LINE (centre it on the line), NOT to a fixed percentage of the hero
      height, or it drifts down into the scroll cue. Keep clear space above
      the scroll cue so the two never overlap.
    - Serif line has a fixed min-height so nothing jumps between facets.
    - Reduced motion: glow centred, no scroll-dot pulse. The line does NOT
      stagger, it just plain-fades the whole line in, no per-word transform.
  ============================================================
-->
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#d9cfc0;display:flex;justify-content:center;padding:40px 20px;font-family:system-ui}
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:ital,opsz,wght@1,9..144,400&family=Kaushan+Script&display=swap');
  .fh{position:relative;overflow:hidden;background:#EAE1D4;border-radius:16px;padding:80px 40px 64px;font-family:'DM Sans',system-ui,sans-serif;color:#211C16;width:100%;max-width:980px;min-height:560px;text-align:center}
  .fh-glow{position:absolute;left:50%;top:46%;width:560px;height:560px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;background:radial-gradient(circle,rgba(255,247,234,.9) 0%,rgba(244,222,201,.48) 28%,rgba(234,225,212,0) 62%);transition:left .14s ease-out,top .14s ease-out;z-index:1}
  .fh-core{position:absolute;left:50%;top:46%;width:240px;height:240px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;background:radial-gradient(circle,rgba(181,97,60,.14) 0%,rgba(181,97,60,0) 65%);transition:left .2s ease-out,top .2s ease-out;z-index:1}
  .fh-word{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;font-family:'Kaushan Script',cursive;font-size:84px;line-height:1;color:#B5613C;opacity:.42;white-space:nowrap;pointer-events:none;z-index:1;transition:opacity .35s}
  .fh-in{position:relative;z-index:2}
  .fh-sig{font-family:'Kaushan Script',cursive;color:#B5613C;font-size:48px;line-height:1;margin:0}
  .fh-role{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#7E7466;margin-top:18px}
  .fh-nav{position:relative;display:inline-flex;flex-wrap:nowrap;gap:6px;margin:44px 0 30px;padding:4px;vertical-align:top}
  .fh-pill{position:absolute;top:4px;left:0;height:calc(100% - 8px);border-radius:999px;background:rgba(255,250,244,.5);-webkit-backdrop-filter:blur(9px) saturate(1.3);backdrop-filter:blur(9px) saturate(1.3);border:1px solid rgba(181,97,60,.3);box-shadow:0 3px 12px rgba(120,80,50,.13),inset 0 1px 0 rgba(255,255,255,.7);z-index:1;transition:transform .44s cubic-bezier(.34,1.42,.5,1),width .44s cubic-bezier(.34,1.42,.5,1)}
  .fh-tab{position:relative;z-index:2;font-family:'DM Sans';font-size:11.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#948A7C;background:none;border:none;border-radius:999px;padding:9px 15px;cursor:pointer;transition:color .3s;white-space:nowrap}
  .fh-tab:hover{color:#5B5346}
  .fh-tab.on{color:#B5613C}
  .fh-line{max-width:560px;margin:20px auto 0;font-family:'Fraunces',serif;font-style:italic;font-size:33px;line-height:1.3;min-height:132px}
  .fh-line .wd{display:inline-block;will-change:opacity,transform}
  .fh-foot{margin-top:60px;color:#9C9182;font-size:12px}
  .fh-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#B5613C;margin-right:7px;vertical-align:middle;animation:fhp 2.4s ease-in-out infinite}
  @keyframes fhp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(181,97,60,.35)}50%{opacity:.5;box-shadow:0 0 0 7px rgba(181,97,60,0)}}
  @media (prefers-reduced-motion:reduce){.fh-dot{animation:none}}
</style>
</head>
<body>
<div class="fh" id="fh">
  <div class="fh-glow" id="fhGlow"></div>
  <div class="fh-core" id="fhCore"></div>
  <div class="fh-word" id="fhWord"></div>
  <div class="fh-in">
    <p class="fh-sig">Akshita Singh</p>
    <div class="fh-role">Product designer</div>
    <div class="fh-nav" id="fhNav"><span class="fh-pill" id="fhPill"></span></div>
    <div class="fh-line" id="fhLine"></div>
    <div class="fh-foot"><span class="fh-dot"></span>scroll to see work</div>
  </div>
</div>
<script>
(function(){
  var F=[
    {t:'Who I am',w:'who i am',l:'A product designer who turns rough ideas into products people use.'},
    {t:'What I do',w:'what i do',l:'I carry work from the first messy sketch to the shipped screen.'},
    {t:'How I work',w:'how i work',l:'Sit with the ambiguity, then narrow it, discover, define, design, validate.'},
    {t:"What I'm up to",w:"what i'm up to",l:'Designing a connected app for Otis, and looking for my next team.'}
  ];
  var nav=document.getElementById('fhNav'),pill=document.getElementById('fhPill'),line=document.getElementById('fhLine'),word=document.getElementById('fhWord'),tabs=[];
  function move(i){var b=tabs[i];if(!b)return;pill.style.width=b.offsetWidth+'px';pill.style.transform='translateX('+b.offsetLeft+'px)';}
  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function raf2(fn){requestAnimationFrame(function(){requestAnimationFrame(fn);});}
  function paint(i){
    word.style.transition='opacity .3s';word.style.opacity=0;
    line.style.transition='opacity .12s';line.style.opacity=0;
    setTimeout(function(){
      word.textContent=F[i].w;
      if(reduce){
        word.style.transition='opacity .3s';word.style.transform='translateY(-50%)';word.style.opacity=.42;
        line.textContent=F[i].l;line.style.transition='opacity .25s';line.style.opacity=1;
      }
      else{
        word.style.transition='none';word.style.opacity=0;word.style.transform='translateY(calc(-50% + 24px)) scale(.97)';
        raf2(function(){word.style.transition='opacity .6s ease, transform .72s cubic-bezier(.22,1,.36,1)';word.style.opacity=.42;word.style.transform='translateY(-50%) scale(1)';});
        line.style.transition='none';line.style.opacity=1;
        line.innerHTML=F[i].l.split(' ').map(function(wd){return '<span class="wd">'+wd+'</span>';}).join(' ');
        var wds=line.querySelectorAll('.wd');
        wds.forEach(function(s,k){
          s.style.opacity=0;s.style.transform='translateY(15px)';
          raf2(function(){s.style.transition='opacity .5s, transform .5s cubic-bezier(.22,1,.36,1)';s.style.transitionDelay=(k*42)+'ms';s.style.opacity=1;s.style.transform='translateY(0)';});
        });
      }
    },150);
    tabs.forEach(function(b,j){b.className='fh-tab'+(j===i?' on':'');});
    move(i);
  }
  F.forEach(function(f,i){var b=document.createElement('button');b.className='fh-tab';b.textContent=f.t;b.onclick=function(){paint(i);};nav.appendChild(b);tabs.push(b);});
  paint(0);
  function curIdx(){for(var k=0;k<tabs.length;k++){if(tabs[k].classList.contains('on'))return k;}return 0;}
  function recalc(){move(curIdx());}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(recalc);}
  window.addEventListener('load',recalc);
  setTimeout(recalc,80);
  window.addEventListener('resize',recalc);
  var hero=document.getElementById('fh'),g=document.getElementById('fhGlow'),c=document.getElementById('fhCore');
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    hero.addEventListener('mousemove',function(e){var r=hero.getBoundingClientRect();var x=e.clientX-r.left,y=e.clientY-r.top;g.style.left=x+'px';g.style.top=y+'px';c.style.left=x+'px';c.style.top=y+'px';});
    hero.addEventListener('mouseleave',function(){g.style.left='50%';g.style.top='46%';c.style.left='50%';c.style.top='46%';});
  }
})();
</script>
</body>
</html>
