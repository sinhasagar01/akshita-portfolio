<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Process section reference</title>
<!--
  REFERENCE ONLY. This is the approved visual target for the Process section.
  Match layout, proportions, spacing, the rounded pill stepper, the check badges,
  the filled connectors, the artifact frame size, and the warm bloom.
  Translate these literal colors to the existing tokens in globals.css, do not hardcode:
    #FAF6EE  cream section surface  -> the page or section cream
    #FBF8F2  inner artifact surface -> --color-surface
    #B5613C  terracotta             -> --color-accent-500
    #211C16  near-black ink         -> --color-text-primary
    #5F584E  secondary text         -> --color-text-secondary
    #7A7265 / #9A9183 / #A79F92 muted -> --color-text-muted / borders
  Headings, set the section heading to about 36px and the stage name to about 30px.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap');
body{margin:0;background:#EFEAE0;display:flex;justify-content:center;padding:40px 16px}
.o2{width:100%;max-width:760px;background:#FAF6EE;border-radius:16px;padding:36px 34px 32px;font-family:'DM Sans',system-ui,sans-serif;color:#211C16}
.o2-eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#857C70}
.o2-head{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:36px;margin:9px 0 24px}
.o2-stage{display:grid;grid-template-columns:1fr 1.15fr;gap:26px;align-items:center}
.o2-idx{font-size:12px;font-weight:500;letter-spacing:1px;color:#B5613C}
.o2-nm{font-family:'Fraunces',serif;font-style:italic;font-size:30px;margin:4px 0 10px}
.o2-d{font-size:13.5px;line-height:1.55;color:#5F584E;min-height:64px}
.o2-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.o2-tags span{font-size:11px;color:#7A7265;border:1px solid rgba(33,28,22,.14);border-radius:999px;padding:4px 11px}
.o2-frame{position:relative;height:212px}
.o2-bloom{position:absolute;inset:-10px;background:radial-gradient(52% 52% at 60% 55%,rgba(181,97,60,.10),rgba(250,246,238,0) 70%);opacity:0;transition:opacity .6s;pointer-events:none}
.o2-bloom.up{opacity:1}
.o2-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .55s ease}
.o2-layer.on{opacity:1}
.o2-steps{display:flex;align-items:center;margin-top:30px}
.o2-pill{flex:0 0 auto;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid rgba(33,28,22,.16);border-radius:12px;padding:11px 16px;background:#FBF8F2;font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#9A9183;cursor:pointer;transition:border-color .35s,color .35s,background .35s;white-space:nowrap}
.o2-pill.cur{border-color:#B5613C;color:#B5613C}
.o2-pill.done{border-color:rgba(181,97,60,.5);background:rgba(181,97,60,.09);color:#B5613C}
.o2-ck{width:16px;height:16px;border-radius:50%;background:#B5613C;display:none;align-items:center;justify-content:center;flex:0 0 auto}
.o2-pill.done .o2-ck{display:flex}
.o2-conn{flex:1;min-width:18px;height:2px;background:rgba(33,28,22,.13);transition:background .35s}
.o2-conn.fill{background:#B5613C}
</style>
</head>
<body>
<div class="o2">
  <div class="o2-eyebrow">Process</div>
  <div class="o2-head">watch the idea become the design</div>
  <div class="o2-stage">
    <div>
      <div class="o2-idx" id="o2idx">01</div>
      <div class="o2-nm" id="o2nm">Discover</div>
      <div class="o2-d" id="o2d"></div>
      <div class="o2-tags" id="o2tags"></div>
    </div>
    <div class="o2-frame">
      <div class="o2-bloom" id="o2bloom"></div>
      <div class="o2-layer on" data-s="0">
        <svg width="200" height="150" viewBox="0 0 200 150" aria-hidden="true">
          <path d="M40 70 q12 -20 26 -4 q14 16 28 0 q12 -14 24 2" fill="none" stroke="#C2BAAD" stroke-width="2" stroke-linecap="round"/>
          <line x1="56" y1="40" x2="84" y2="34" stroke="#C8C0B3" stroke-width="2" stroke-linecap="round"/>
          <circle cx="128" cy="46" r="3" fill="#CBC3B6"/><circle cx="150" cy="92" r="3" fill="#CBC3B6"/>
          <text x="92" y="116" font-family="Fraunces,serif" font-style="italic" font-size="34" fill="#CBC3B6">?</text>
        </svg>
      </div>
      <div class="o2-layer" data-s="1">
        <svg width="200" height="150" viewBox="0 0 200 150" aria-hidden="true">
          <rect x="40" y="26" width="120" height="20" rx="4" fill="none" stroke="#BDB5A8" stroke-width="1.6" stroke-dasharray="5 4"/>
          <rect x="40" y="56" width="56" height="68" rx="4" fill="none" stroke="#BDB5A8" stroke-width="1.6" stroke-dasharray="5 4"/>
          <rect x="104" y="56" width="56" height="30" rx="4" fill="none" stroke="#BDB5A8" stroke-width="1.6" stroke-dasharray="5 4"/>
          <rect x="104" y="94" width="56" height="30" rx="4" fill="none" stroke="#BDB5A8" stroke-width="1.6" stroke-dasharray="5 4"/>
        </svg>
      </div>
      <div class="o2-layer" data-s="2">
        <svg width="200" height="150" viewBox="0 0 200 150" aria-hidden="true">
          <rect x="38" y="22" width="124" height="106" rx="9" fill="#FBF8F2" stroke="#211C16" stroke-opacity=".7" stroke-width="1.2"/>
          <circle cx="50" cy="34" r="2.4" fill="#C7BFB2"/><circle cx="58" cy="34" r="2.4" fill="#C7BFB2"/>
          <rect x="48" y="50" width="70" height="8" rx="3" fill="rgba(33,28,22,.22)"/>
          <rect x="48" y="66" width="104" height="6" rx="3" fill="rgba(33,28,22,.12)"/>
          <rect x="48" y="80" width="88" height="6" rx="3" fill="rgba(33,28,22,.12)"/>
          <rect x="48" y="100" width="42" height="14" rx="4" fill="rgba(181,97,60,.85)"/>
        </svg>
      </div>
      <div class="o2-layer" data-s="3">
        <svg width="200" height="150" viewBox="0 0 200 150" aria-hidden="true">
          <rect x="38" y="22" width="124" height="106" rx="9" fill="#FBF8F2" stroke="#211C16" stroke-opacity=".75" stroke-width="1.2"/>
          <circle cx="50" cy="34" r="2.4" fill="#C7BFB2"/><circle cx="58" cy="34" r="2.4" fill="#C7BFB2"/>
          <rect x="48" y="50" width="70" height="8" rx="3" fill="rgba(33,28,22,.22)"/>
          <rect x="48" y="66" width="104" height="6" rx="3" fill="rgba(33,28,22,.12)"/>
          <rect x="48" y="80" width="88" height="6" rx="3" fill="rgba(33,28,22,.12)"/>
          <rect x="48" y="100" width="42" height="14" rx="4" fill="rgba(181,97,60,.9)"/>
          <circle cx="158" cy="28" r="14" fill="#B5613C"/>
          <path d="M152 28 l4 4 8 -9" fill="none" stroke="#FBF8F2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="o2-steps" id="o2steps"></div>
</div>
<script>
(function(){
  var S=[
    {nm:'Discover',d:'I listen first, to users and to the business, before drawing anything.',t:['interviews','research','audits']},
    {nm:'Define',d:'I frame the real problem, who it serves, and what success looks like.',t:['personas','journeys','scope']},
    {nm:'Design',d:'I shape it, from wireframes through to polished, interactive UI.',t:['wireframes','prototypes','design systems']},
    {nm:'Validate',d:'I put it in front of people, refine, and measure the impact.',t:['usability tests','iteration','handoff']}
  ];
  var idx=document.getElementById('o2idx'),nm=document.getElementById('o2nm'),d=document.getElementById('o2d'),tags=document.getElementById('o2tags'),bloom=document.getElementById('o2bloom'),layers=document.querySelectorAll('.o2-layer'),steps=document.getElementById('o2steps'),cur=0,timer,pills=[],conns=[];
  var CK='<span class="o2-ck"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M4.5 8 l2.2 2.2 4.8 -5.2" fill="none" stroke="#FBF8F2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
  S.forEach(function(s,i){
    var p=document.createElement('button');p.className='o2-pill';p.innerHTML=CK+'<span>'+s.nm+'</span>';p.onclick=function(){set(i);rest();};steps.appendChild(p);pills.push(p);
    if(i<3){var c=document.createElement('div');c.className='o2-conn';steps.appendChild(c);conns.push(c);}
  });
  function set(i){cur=i;var s=S[i];idx.textContent='0'+(i+1);nm.textContent=s.nm;d.textContent=s.d;tags.innerHTML=s.t.map(function(x){return '<span>'+x+'</span>';}).join('');
    [].forEach.call(layers,function(l){l.className='o2-layer'+(+l.dataset.s===i?' on':'');});
    bloom.className='o2-bloom'+(i===3?' up':'');
    pills.forEach(function(p,j){p.className='o2-pill'+(j<i?' done':j===i?' cur':'');});
    conns.forEach(function(c,j){c.className='o2-conn'+(j<i?' fill':'');});
  }
  function rest(){clearInterval(timer);timer=setInterval(function(){set((cur+1)%4);},2600);}
  set(0);rest();
})();
</script>
</body>
</html>
