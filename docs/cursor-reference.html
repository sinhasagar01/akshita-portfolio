<!doctype html>
<!--
  CUSTOM CURSOR  (option A, dot + trailing ring)
  ------------------------------------------------------------------
  A small terracotta dot tracks the pointer exactly. A larger ring trails
  behind with eased follow (lerp). Hover states:
    - over links / buttons (default interactive): ring tightens and brightens.
    - over a Work card (data-cursor="card"): ring blooms into a soft filled disc,
      dot fades out.
    - over text inputs / textareas / contenteditable: custom cursor hides and the
      NATIVE caret shows, so typing never feels broken.

  COLOR MAP  (literal -> token)
    #B5613C dot + ring          -> --color-accent-500
    rgba(181,97,60,.55) ring border at rest
    rgba(181,97,60,.8)  ring border on link hover
    rgba(181,97,60,.12) filled disc over a card

  ACCESSIBILITY / GATING (bake all of these in)
    1. POINTER: only enable when matchMedia('(pointer:fine)').matches. On touch or
       coarse pointers, do not mount and do not hide the native cursor.
    2. REDUCED MOTION: when matchMedia('(prefers-reduced-motion:reduce)').matches,
       drop the lag. The ring tracks the pointer exactly (no lerp). Keep the visuals.
    3. INPUTS: while over input, textarea, select, or [contenteditable], hide the dot
       and ring and let the native caret show (cursor:auto on those, cursor:none elsewhere).

  REACT COMPONENT  (components/ui/CustomCursor.tsx, "use client")
    - Mount once in the root layout, near the PageLoader, after the providers.
    - Two fixed divs (dot, ring), z-index very high, pointer-events none.
    - On mount: if pointer is not fine, render nothing. Otherwise add a class to
      <html> (e.g. "has-custom-cursor") whose CSS sets cursor:none on everything,
      and cursor:auto on input, textarea, select, [contenteditable].
    - Track pointer in a mousemove listener (passive). Position the dot directly via
      transform translate3d. Animate the ring in a rAF loop with lerp factor ~.16
      (skip the lerp and snap when reduced motion).
    - Hover via delegated listeners on document: on mouseover, target.closest(...)
        a, button, [role="button"], .cursor-link  -> link state (ring ~46px, border .8 alpha)
        [data-cursor="card"]                       -> card state (ring ~84px, filled .12, border transparent, dot opacity 0)
        input, textarea, select, [contenteditable] -> input state (hide dot+ring)
      reset on mouseout.
    - Clean up listeners and rAF on unmount.
    - Optional hero wink (not enabled here): swap the dot for a small sparkle only
      while over the hero, a one-line state toggle if wanted later.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Custom cursor reference</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#B5613C; --ink:#211C16; --cream:#FBF6EE; --sand:#E3D7C4; --cream2:#F3EADB; }
  *{box-sizing:border-box}
  html.has-custom-cursor, html.has-custom-cursor *{cursor:none}
  html.has-custom-cursor input, html.has-custom-cursor textarea, html.has-custom-cursor select, html.has-custom-cursor [contenteditable]{cursor:auto}
  body{margin:0;background:var(--sand);font-family:'DM Sans',system-ui,sans-serif;color:var(--ink)}
  .col{max-width:880px;margin:0 auto;padding:46px 26px}
  .panel{background:var(--cream);border-radius:16px;padding:52px 46px;min-height:340px}
  .lead{font-family:'Fraunces';font-size:26px;line-height:1.35;max-width:560px;margin:0 0 26px;color:#23201c}
  .link{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(181,97,60,.4)}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-top:6px}
  .card{display:inline-flex;align-items:center;justify-content:center;width:200px;height:120px;border-radius:14px;background:var(--cream2);color:#6b5f4f;font-size:13px}
  .btn{border:1px solid rgba(181,97,60,.5);color:var(--accent);background:none;border-radius:999px;padding:10px 18px;font-size:13px;font-family:inherit}
  .field{margin-top:18px;width:280px;height:40px;border-radius:10px;border:1px solid rgba(120,90,60,.25);background:#fff;padding:0 14px;font-family:inherit;font-size:14px}
  .dot{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--accent);left:0;top:0;transform:translate3d(-50%,-50%,0);pointer-events:none;z-index:9999;opacity:0;transition:opacity .2s}
  .ring{position:fixed;width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(181,97,60,.55);left:0;top:0;transform:translate3d(-50%,-50%,0);pointer-events:none;z-index:9998;opacity:0;transition:width .25s,height .25s,background .25s,border-color .25s,opacity .2s}
</style>
</head>
<body>
  <div class="col">
    <div class="panel">
      <p class="lead">Move around. Hover the <a href="#" class="link">link</a>, the button, and the card to feel the ring react. Click into the field and the native caret comes back.</p>
      <div class="row">
        <button class="btn">A button</button>
        <div class="card" data-cursor="card">Work card</div>
      </div>
      <input class="field" placeholder="Type here, native caret returns" />
    </div>
  </div>

  <div class="dot" id="dot"></div>
  <div class="ring" id="ring"></div>
<script>
(function(){
  var fine = window.matchMedia('(pointer:fine)').matches;
  if(!fine) return;
  var reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  document.documentElement.classList.add('has-custom-cursor');

  var dot=document.getElementById('dot'), ring=document.getElementById('ring');
  var mx=0,my=0,rx=0,ry=0,shown=false;

  function setRing(w,h,bg,bc){ ring.style.width=w;ring.style.height=h;ring.style.background=bg;ring.style.borderColor=bc; }

  document.addEventListener('mousemove',function(e){
    mx=e.clientX;my=e.clientY;
    dot.style.left=mx+'px';dot.style.top=my+'px';
    if(reduce){ ring.style.left=mx+'px';ring.style.top=my+'px'; }
    if(!shown){ shown=true; dot.style.opacity='1';ring.style.opacity='1'; }
  },{passive:true});
  document.addEventListener('mouseleave',function(){ shown=false; dot.style.opacity='0';ring.style.opacity='0'; });

  document.addEventListener('mouseover',function(e){
    var t=e.target;
    if(t.closest('input,textarea,select,[contenteditable]')){ dot.style.opacity='0';ring.style.opacity='0'; return; }
    if(t.closest('[data-cursor="card"]')){ setRing('84px','84px','rgba(181,97,60,.12)','rgba(181,97,60,0)'); dot.style.opacity='0'; return; }
    if(t.closest('a,button,[role="button"],.cursor-link')){ setRing('46px','46px','transparent','rgba(181,97,60,.8)'); dot.style.opacity='1'; return; }
  });
  document.addEventListener('mouseout',function(e){
    var t=e.target;
    if(t.closest('input,textarea,select,[contenteditable],[data-cursor="card"],a,button,[role="button"],.cursor-link')){
      setRing('34px','34px','transparent','rgba(181,97,60,.55)');
      if(shown){ dot.style.opacity='1';ring.style.opacity='1'; }
    }
  });

  if(!reduce){ (function loop(){ rx+=(mx-rx)*.16; ry+=(my-ry)*.16; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })(); }
})();
</script>
</body>
</html>
